<!-- ====== HALAMAN PJUM ====== -->
<div id="page-pjum" class="page">
    <h2><i class="fas fa-file-invoice"></i> Dashboard PJUM</h2>

    <!-- FILTER PJUM -->
    <div class="filter-bar" id="filterBarPjum" style="display:none;">
        <div class="filter-group">
            <label><i class="fas fa-calendar"></i> Bulan</label>
            <select id="pjumFilterBulan"><option value="all">Semua Bulan</option></select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-calendar-alt"></i> Tahun</label>
            <select id="pjumFilterTahun"><option value="all">Semua Tahun</option></select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-users"></i> Staf</label>
            <select id="pjumFilterStaf"><option value="all">Semua Staf</option></select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-project-diagram"></i> Program</label>
            <select id="pjumFilterProgram"><option value="all">Semua Program</option></select>
        </div>
        <button class="btn-filter" id="pjumApplyFilter"><i class="fas fa-filter"></i> Terapkan</button>
        <button class="btn-filter btn-reset" id="pjumResetFilter"><i class="fas fa-undo"></i> Reset</button>
    </div>

    <!-- Ringkasan -->
    <div class="metric-grid" style="grid-template-columns: repeat(4, 1fr);">
        <div class="metric-card">
            <div class="label">Total Pengeluaran</div>
            <div class="value" id="pjumPageTotal">Rp0</div>
        </div>
        <div class="metric-card">
            <div class="label">Total File</div>
            <div class="value" id="pjumPageFile">0</div>
        </div>
        <div class="metric-card">
            <div class="label">Total Proyek</div>
            <div class="value" id="pjumPageProyek">0</div>
        </div>
        <div class="metric-card">
            <div class="label">Total Staf</div>
            <div class="value" id="pjumPageStaf">0</div>
        </div>
    </div>

    <!-- Grafik PJUM -->
    <div class="chart-grid">
        <div class="chart-card">
            <h3><i class="fas fa-money-bill-wave"></i> Pengeluaran PJUM per Bulan</h3>
            <div class="chart-wrapper"><canvas id="pjumPengeluaranChart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3><i class="fas fa-chart-pie"></i> Distribusi Biaya per Komponen</h3>
            <div class="chart-wrapper"><canvas id="pjumKomponenChart"></canvas></div>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-card">
            <h3><i class="fas fa-building"></i> Top 5 Proyek dengan Biaya Tertinggi</h3>
            <ul class="top5-list" id="pjumTopProyekList">
                <li>Memuat data...</li>
            </ul>
        </div>
        <div class="chart-card">
            <h3><i class="fas fa-user-tie"></i> Top 5 Staf dengan Biaya Tertinggi</h3>
            <ul class="top5-list" id="pjumTopStafList">
                <li>Memuat data...</li>
            </ul>
        </div>
    </div>
</div>

<!-- ====== HALAMAN BENEFICIARY ====== -->
<div id="page-beneficiary" class="page">
    <h2><i class="fas fa-users"></i> Dashboard Beneficiary</h2>

    <!-- FILTER BENEF -->
    <div class="filter-bar" id="filterBarBenef" style="display:none;">
        <div class="filter-group">
            <label><i class="fas fa-calendar"></i> Bulan</label>
            <select id="benefFilterBulan"><option value="all">Semua Bulan</option></select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-calendar-alt"></i> Tahun</label>
            <select id="benefFilterTahun"><option value="all">Semua Tahun</option></select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-users"></i> Staf</label>
            <select id="benefFilterStaf"><option value="all">Semua Staf</option></select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-project-diagram"></i> Program</label>
            <select id="benefFilterProgram"><option value="all">Semua Program</option></select>
        </div>
        <button class="btn-filter" id="benefApplyFilter"><i class="fas fa-filter"></i> Terapkan</button>
        <button class="btn-filter btn-reset" id="benefResetFilter"><i class="fas fa-undo"></i> Reset</button>
    </div>

    <!-- Ringkasan -->
    <div class="metric-grid" style="grid-template-columns: repeat(4, 1fr);">
        <div class="metric-card">
            <div class="label">Total Beneficiary</div>
            <div class="value" id="benefPageTotal">0</div>
        </div>
        <div class="metric-card">
            <div class="label">Unique Beneficiary</div>
            <div class="value" id="benefPageUnique">0</div>
        </div>
        <div class="metric-card">
            <div class="label">Total Desa</div>
            <div class="value" id="benefPageDesa">0</div>
        </div>
        <div class="metric-card">
            <div class="label">Total Program</div>
            <div class="value" id="benefPageProgram">0</div>
        </div>
    </div>

    <!-- Grafik Beneficiary -->
    <div class="chart-grid">
        <div class="chart-card">
            <h3><i class="fas fa-chart-line"></i> Trend Beneficiary per Bulan</h3>
            <div class="chart-wrapper"><canvas id="benefTrendChart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3><i class="fas fa-chart-pie"></i> Distribusi Jenis Beneficiary</h3>
            <div class="chart-wrapper"><canvas id="benefDistribusiChart"></canvas></div>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-card">
            <h3><i class="fas fa-map-marked-alt"></i> Beneficiary per Desa (Top 10)</h3>
            <div class="chart-wrapper"><canvas id="benefDesaChart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3><i class="fas fa-trophy"></i> Top 5 Kegiatan Beneficiary</h3>
            <ul class="top5-list" id="benefTop5List">
                <li>Memuat data...</li>
            </ul>
        </div>
    </div>
</div>

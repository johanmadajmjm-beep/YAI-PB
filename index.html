<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Executive Dashboard — Yayasan Ayo Indonesia</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Chart.js - Multiple CDN Fallback -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <script>
        if (typeof Chart === 'undefined') {
            document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"><\/script>');
        }
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <div class="app">

        <!-- ====== NAVBAR ====== -->
        <nav class="navbar">
            <div class="brand">
                <i class="fas fa-chart-pie"></i>
                <span>Executive Dashboard</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li class="active" data-page="dashboard"><i class="fas fa-th-large"></i> Dashboard</li>
                <li data-page="beneficiary"><i class="fas fa-users"></i> Beneficiary</li>
                <li data-page="pjum"><i class="fas fa-file-invoice"></i> PJUM</li>
                <li data-page="wilayah"><i class="fas fa-map-marker-alt"></i> Wilayah</li>
                <li data-page="analitik"><i class="fas fa-chart-line"></i> Analitik</li>
                <li data-page="data"><i class="fas fa-database"></i> Data</li>
                <li data-page="laporan"><i class="fas fa-file-alt"></i> Laporan</li>
                <li data-page="pengaturan"><i class="fas fa-cog"></i> Pengaturan</li>
            </ul>
        </nav>

        <!-- ====== MAIN CONTENT ====== -->
        <main class="main-content" id="pageContent">
            <!-- Konten akan di-load oleh router.js -->
            <div style="text-align:center;padding:60px 0;color:var(--gray-400);">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p style="margin-top:12px;">Memuat dashboard...</p>
            </div>
        </main>

        <!-- ====== MODAL DETAIL ====== -->
        <div class="modal-overlay" id="detailModal">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modalTitle">Detail Analitik</h3>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <p>Memuat data...</p>
                </div>
            </div>
        </div>

    </div>

    <!-- ====== JS ====== -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/metrics.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/insights.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/router.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
